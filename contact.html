<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact — Poyraz Bariskan</title>
    <meta name="description" content="Get in touch with Poyraz Bariskan.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <style>
      .contact-wrap {
        width: min(820px, calc(100% - 40px));
        margin-inline: auto;
        padding: 60px 0 100px;
      }

      .page-eyebrow {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--merge);
        margin-bottom: 14px;
        animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
      }

      .page-title {
        font-family: var(--display);
        font-size: clamp(2.8rem, 8vw, 5.8rem);
        font-weight: 900;
        line-height: 0.88;
        letter-spacing: -0.03em;
        margin-bottom: 20px;
        animation: fadeUp 0.6s 0.08s cubic-bezier(0.16,1,0.3,1) both;
      }

      .page-title .grad {
        display: block;
        background: linear-gradient(100deg, var(--cold) 0%, var(--merge) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .page-sub {
        font-size: 1.05rem;
        color: var(--muted);
        margin-bottom: 56px;
        animation: fadeUp 0.6s 0.14s cubic-bezier(0.16,1,0.3,1) both;
      }

      /* ── Contact grid ── */
      .contact-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
        animation: fadeUp 0.6s 0.2s cubic-bezier(0.16,1,0.3,1) both;
      }

      .contact-card:last-child:nth-child(odd) {
        grid-column: 1 / -1;
        max-width: calc(50% - 7px);
        margin-inline: auto;
      }

      @media (max-width: 640px) {
        .contact-card:last-child:nth-child(odd) {
          max-width: 100%;
        }
      }

      .contact-card {
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 22px 24px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        text-decoration: none;
        color: var(--text);
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        transition:
          transform    0.35s cubic-bezier(0.16,1,0.3,1),
          border-color 0.35s,
          box-shadow   0.35s;
      }

      .contact-card:hover { transform: translateY(-6px); }

      .contact-card.c-email:hover {
        border-color: rgba(207,160,60,0.4);
        box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 40px rgba(207,160,60,0.1);
      }
      .contact-card.c-github:hover {
        border-color: rgba(255,255,255,0.18);
        box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255,255,255,0.05);
      }
      .contact-card.c-twitter:hover {
        border-color: rgba(29,155,240,0.4);
        box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 40px rgba(29,155,240,0.1);
      }
      .contact-card.c-instagram:hover {
        border-color: rgba(225,48,108,0.4);
        box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 40px rgba(225,48,108,0.1);
      }
      .contact-card.c-linkedin:hover {
        border-color: rgba(10,102,194,0.45);
        box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 40px rgba(10,102,194,0.12);
      }

      /* Icon box */
      .c-icon {
        width: 46px;
        height: 46px;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 1.2rem;
        transition: background 0.3s;
      }

      .c-email    .c-icon { background: rgba(207,160,60,0.1); }
      .c-github   .c-icon { background: rgba(255,255,255,0.06); }
      .c-twitter  .c-icon { background: rgba(29,155,240,0.1); }
      .c-instagram .c-icon { background: rgba(225,48,108,0.1); }
      .c-linkedin  .c-icon { background: rgba(10,102,194,0.1); }

      .c-email:hover    .c-icon { background: rgba(207,160,60,0.18); }
      .c-github:hover   .c-icon { background: rgba(255,255,255,0.1); }
      .c-twitter:hover  .c-icon { background: rgba(29,155,240,0.18); }
      .c-instagram:hover .c-icon { background: rgba(225,48,108,0.18); }
      .c-linkedin:hover  .c-icon { background: rgba(10,102,194,0.18); }

      /* Text */
      .c-text { flex: 1; min-width: 0; }

      .c-label {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 3px;
      }

      .c-value {
        font-size: 0.97rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Arrow */
      .c-arrow {
        color: var(--muted);
        font-size: 1.1rem;
        flex-shrink: 0;
        transition: transform 0.25s, color 0.25s;
      }

      .contact-card:hover .c-arrow {
        color: var(--text);
        transform: translate(3px, -3px);
      }

      @media (max-width: 580px) {
        .contact-wrap { padding-top: 36px; }
      }
    </style>
  </head>
