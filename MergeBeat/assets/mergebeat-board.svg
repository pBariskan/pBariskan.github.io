<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" role="img" aria-labelledby="title desc">
  <title id="title">MergeBeat board</title>
  <desc id="desc">A stylized MergeBeat number tile puzzle board.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f3d3e"/>
    </linearGradient>
    <linearGradient id="tile-a" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8e36a"/>
      <stop offset="1" stop-color="#f2a541"/>
    </linearGradient>
    <linearGradient id="tile-b" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#56f0c1"/>
      <stop offset="1" stop-color="#1da8a2"/>
    </linearGradient>
    <linearGradient id="tile-c" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8fb8ff"/>
      <stop offset="1" stop-color="#4c6fff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="960" height="660" fill="url(#bg)"/>
  <circle cx="138" cy="112" r="86" fill="#56f0c1" opacity="0.16"/>
  <circle cx="806" cy="104" r="112" fill="#f8e36a" opacity="0.14"/>
  <circle cx="808" cy="560" r="126" fill="#8fb8ff" opacity="0.13"/>
  <g filter="url(#shadow)">
    <rect x="180" y="72" width="600" height="516" rx="32" fill="#101820" stroke="#ffffff" stroke-opacity="0.16" stroke-width="3"/>
    <rect x="220" y="112" width="520" height="436" rx="24" fill="#17232e"/>
    <g font-family="Inter, Arial, sans-serif" font-weight="900" font-size="54" text-anchor="middle">
      <rect x="248" y="140" width="112" height="112" rx="18" fill="url(#tile-a)"/>
      <text x="304" y="214" fill="#17232e">2</text>
      <rect x="384" y="140" width="112" height="112" rx="18" fill="url(#tile-b)"/>
      <text x="440" y="214" fill="#092421">4</text>
      <rect x="520" y="140" width="112" height="112" rx="18" fill="#253545"/>
      <text x="576" y="214" fill="#8090a5">8</text>
      <rect x="248" y="276" width="112" height="112" rx="18" fill="#253545"/>
      <text x="304" y="350" fill="#8090a5">4</text>
      <rect x="384" y="276" width="112" height="112" rx="18" fill="url(#tile-c)"/>
      <text x="440" y="350" fill="#0f1c39">8</text>
      <rect x="520" y="276" width="112" height="112" rx="18" fill="url(#tile-a)"/>
      <text x="576" y="350" fill="#17232e">2</text>
      <rect x="248" y="412" width="112" height="112" rx="18" fill="url(#tile-b)"/>
      <text x="304" y="486" fill="#092421">16</text>
      <rect x="384" y="412" width="112" height="112" rx="18" fill="#253545"/>
      <text x="440" y="486" fill="#8090a5">2</text>
      <rect x="520" y="412" width="112" height="112" rx="18" fill="url(#tile-c)"/>
      <text x="576" y="486" fill="#0f1c39">16</text>
