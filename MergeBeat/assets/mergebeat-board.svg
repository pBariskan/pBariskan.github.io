    <path d="M655 252c38 22 61 56 61 94 0 82-106 149-236 149" fill="none" stroke="#56f0c1" stroke-width="18" stroke-linecap="round" opacity="0.84"/>
    <path d="M480 495l38-36M480 495l48 25" fill="none" stroke="#56f0c1" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.84"/>
  </g>
